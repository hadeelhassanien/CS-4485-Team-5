version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: creatorxp-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: creatorxp
      MYSQL_USER: creatorxp_user
      MYSQL_PASSWORD: projectyay!
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql

volumes:
  mysql_data: